<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Blog moved announcement for z3moo.github.io" />
    <meta name="theme-color" content="#0f172a" />
    <title>Blog moved</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-2: #0f172a;
        --card: rgba(15, 23, 42, 0.86);
        --card-border: rgba(148, 163, 184, 0.22);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #22c55e;
        --shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 34%),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 30%),
          linear-gradient(160deg, var(--bg), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
      }

      .card {
        position: relative;
        overflow: hidden;
        padding: clamp(28px, 5vw, 56px);
        border: 1px solid var(--card-border);
        border-radius: 28px;
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: rgba(8, 15, 31, 0.65);
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent-2);
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.14);
      }

      h1 {
        margin: 20px 0 14px;
        font-size: clamp(2.2rem, 6vw, 4.4rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.05rem, 2vw, 1.2rem);
        line-height: 1.7;
      }

      .actions {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      a.button:hover,
      a.button:focus-visible {
        transform: translateY(-1px);
      }

      .primary {
        color: #06111f;
        background: linear-gradient(135deg, #7dd3fc, #38bdf8);
        border: 1px solid rgba(125, 211, 252, 0.55);
      }

      .secondary {
        color: var(--text);
        background: rgba(15, 23, 42, 0.45);
        border: 1px solid rgba(148, 163, 184, 0.28);
      }

      .url {
        margin-top: 18px;
        font-size: 0.98rem;
        color: #cbd5e1;
        word-break: break-word;
      }

      .url strong {
        color: var(--accent);
        font-weight: 700;
      }

      .footer {
        margin-top: 18px;
        color: #64748b;
        font-size: 0.92rem;
      }

      .glow {
        position: absolute;
        inset: auto -12% -38% auto;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.18), transparent 68%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="title">
        <div class="glow" aria-hidden="true"></div>
        <div class="badge">Notice</div>
        <h1 id="title">My blog has moved.</h1>
        <p>
          This site is no longer updated here. Please visit the new home of the blog at
          <strong>blog.pachoalto.xyz</strong>.
        </p>
        <div class="actions">
          <a class="button primary" href="https://blog.pachoalto.xyz" rel="noopener noreferrer">
            Go to the new blog
          </a>
        </div>
        <div class="url">
          New address: <strong>https://blog.pachoalto.xyz</strong>
        </div>
        <div class="footer">If you reached this page from an old link, update your bookmarks.</div>
      </section>
    </main>
  </body>
</html>
